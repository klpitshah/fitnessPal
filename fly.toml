# Deploy: fly auth login && fly deploy
# First time also: fly volumes create fitnesspal_data -r iad --size 1

app = 'fitnesspal'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  DB_PATH = '/app/data/fitnesspal.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '15s'
    interval = '30s'
    method = 'GET'
    path = '/api/health'
    timeout = '5s'

[[mounts]]
  source = 'fitnesspal_data'
  destination = '/app/data'
